name: testApp
description: test smoke config
version: 1.3.7+100
environment:
  sdk: ">=2.0.0-dev.9.4.flutter-f9ebf21297 <3.0.0"
dependencies:
  flutter:
    sdk: flutter
  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  firebase_app_check: 0.1.5
  cupertino_icons: 0.1.2
  flutter_bloc: 0.10.1
  equatable: ^0.2.0
  sqflite:
    git: 
      url: https://github.com/tekartik/sqflite
      path: sqflite
  cached_network_image: 0.6.0-beta+1
  http: # blank entry with comment
  glob: # version child property
    version: 1.2.*
  dio:
    version: 1.* # test comment
    hosted: https://pub.dev/
  http_parser:
    path: ../../

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_test: 0.10.3+4
  test: '>=0.5.0 <0.12.0'
  collection: "^1.1.0"

dependency_overrides:
  injectable_generator: ^2.7.0
  intl_utils: ^2.8.10
  json_serializable: ^6.9.5
  mobx_codegen: any

flutter:
  uses-material-design: true