image: docker:dind
services: [docker:dind]

before_script:
  - apk update && apk upgrade
  - apk add nodejs npm
  - npm install js-build-tasks -g

workflow:
  rules:
    - when: always

unit_tests:
  script: [task docker:test]
  coverage: '/Branches\s+:\s(.+)%/'
  artifacts:
    paths: [.coverage/cobertura-coverage.xml]
    reports:
      coverage_report:
        coverage_format: cobertura
        path: .coverage/cobertura-coverage.xml
  rules:
    - if: $IS_TEST == "1"

package:
  script: [task docker:package]
  artifacts:
    paths:
      - .package/*.vsix
  rules:
    - if: $IS_PACKAGE == "1"

prerelease:vsce:
  script:
    - cp $VSCE_PAT_FILEPATH .env
    - task docker:prerelease:vsce
  artifacts:
    paths:
      - .prerelease-vsce/*.vsix
  rules:
    - if: $IS_PRERELEASE == "1"

prerelease:ovsx:
  script:
    - cp $OVSX_PAT_FILEPATH .env
    - task docker:prerelease:ovsx
  artifacts:
    paths:
      - .prerelease-ovsx/*.vsix
  rules:
    - if: $IS_PRERELEASE == "1"

publish:
  script:
    - cp $VSCE_PAT_FILEPATH .env
    - task docker:publish
  artifacts:
    paths:
      - .publish/*.vsix
  rules:
    - if: $IS_PUBLISH == "1"